{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Registro</title>
    <link rel="stylesheet" href="{% static 'accounts/styles.css' %}">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url("{% static 'accounts/fondo.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: rgba(255,255,255,0.97);
            border-radius: 22px;
            box-shadow: 0 12px 40px rgba(34,80,34,0.22);
            padding: 2.8rem 2.2rem;
            width: 100%;
            max-width: 390px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .auth-title {
            font-size: 2.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #388e3c;
            letter-spacing: 1px;
        }
        .auth-form input {
            width: 100%;
            padding: 0.85rem;
            margin-bottom: 1.1rem;
            border: 1.5px solid #c8e6c9;
            border-radius: 9px;
            font-size: 1.05rem;
            background: #f1f8e9;
            transition: border 0.2s;
        }
        .auth-form input:focus {
            border: 2px solid #388e3c;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, #43a047 60%, #8bc34a 100%);
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(67,160,71,0.13);
        }
        .auth-btn:hover {
            background: linear-gradient(90deg, #388e3c 60%, #689f38 100%);
        }
        .auth-link {
            color: #388e3c;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-title">Registro</div>
        {% if messages %}
            {% for message in messages %}
                <div style="color: #b00020; margin-bottom: 10px;">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form class="auth-form" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="auth-btn" type="submit">Registrarse</button>
        </form>
        <div style="margin-top:1rem;">
            <a class="auth-link" href="{% url 'login' %}">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</body>
</html>

</body>
</html>
